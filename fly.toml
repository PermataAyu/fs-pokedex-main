# fly.toml app configuration file generated for fs-pdex on 2026-05-21T09:55:21+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fs-pdex'
primary_region = 'sin'

[build]

[env]
  PORT = "5001"

[deploy]
  strategy = "canary"

[processes]
  app = "node app.js"

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
